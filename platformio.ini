; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[platformio]
; This branch (ble_sender_mcu) focuses on the BLE hub -> default to it.
default_envs = test_gps

; ------------------------------------------------------------------------------
; SHARED SETTINGS (Applies to all environments below)
; ------------------------------------------------------------------------------#
[env]
framework = arduino
monitor_speed = 115200
build_flags = 
    -std=gnu++17
    -I${platformio.packages_dir}/framework-arduinoadafruitnrf52/libraries/Adafruit_TinyUSB_Arduino/src

lib_deps =
    adafruit/Adafruit MPU6050 @ ^2.2.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    ;madhephaestus/ESP32Servo @ ^3.0.6
    arduino-libraries/Madgwick
    tkjelectronics/Kalman Filter Library @ ^1.0.2
    sparkfun/SparkFun Qwiic Scale NAU7802 Arduino Library @ ^1.0.4
    tomstewart89/BasicLinearAlgebra
    adafruit/Adafruit MMC56x3
    ADS1115_WE
    mikalhart/TinyGPSPlus@^1.0.3

; ------------------------------------------------------------------------------
; 1. PRODUCTION ENVIRONMENTS
; ------------------------------------------------------------------------------
[env:espNow_receiver_esp]
platform = espressif32
board = nodemcu-32s
;upload_port = /dev/ttyUSB0
;monitor_port = /dev/ttyUSB0
build_src_filter = +<../src/main_espNow_receiver.cpp>

[env:espNow_sensor_esp]
platform = espressif32
board = esp32-s3-devkitc-1
board_upload.flash_size = 4MB
board_build.partitions = default.csv
board_build.arduino.memory_type = qio_opi
; ESP32-S3 nutzt natives USB-CDC -> ohne diese Flags kommt kein Serial-Output an
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

;upload_port = /dev/ttyACM0
;monitor_port = /dev/ttyACM0
build_src_filter = +<../src/main_espNow_sender.cpp>

; ──────────────────────────────────────────────────────────────────────────────
; Telemetry hub (XIAO nRF52840 Sense): UART in from aggregator, onboard GPS +
; 6-axis IMU (accel) + battery, broadcasts via BLE to up to 4 phones.
;
; >>> MERGE NOTE (-> main): this env REPLACES the team's [env:BLE_sender_xiao]
; (maxgerhardt/platform-nordicnrf52). When merging this branch into main, DELETE
; BLE_sender_xiao and keep this prod_BLE_sender env — it is verified to build the
; GPS+IMU+BLE firmware on Seeed's platform + Adafruit nRF52 BSP. <<<
; ──────────────────────────────────────────────────────────────────────────────
[env:prod_BLE_sender]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-afruitnrf52-nrf52840
upload_port = /dev/cu.usbmodem1101
monitor_port = /dev/cu.usbmodem1101
;build_src_filter = +<../test/test_ble.cpp> -<*>
build_src_filter = -<*> +<main_BLE_sender.cpp>
; The platform-seeedboards nrf_arduino.py adds .../Adafruit_TinyUSB_Arduino/src/arduino
; to CPPPATH but not .../src itself, so Wire_nRF52.cpp's unconditional
; #include <Adafruit_TinyUSB.h> fails to resolve without this.
build_flags =
    -std=gnu++17
    ;-I${platformio.packages_dir}/framework-arduinoadafruitnrf52/libraries/Adafruit_TinyUSB_Arduino/src
; nRF52-only deps. Defining lib_deps here overrides [env]'s ESP32-oriented libs
; so the LDF doesn't try to pull them into the nRF52 build.
lib_deps =
    mikalhart/TinyGPSPlus@^1.0.3
    adafruit/Adafruit LSM6DS @ ^4.0
    adafruit/Adafruit Unified Sensor @ ^1.1.14

; ------------------------------------------------------------------------------
; 2. TEST ENVIRONMENTS
; ------------------------------------------------------------------------------
[env:test_gps]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-afruitnrf52-nrf52840
; upload_port = /dev/cu.usbmodem1101
; monitor_port = /dev/cu.usbmodem101

build_src_filter = -<*> +<../test/test_gps.cpp>

[env:test_imu]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-afruitnrf52-nrf52840
upload_port = /dev/cu.usbmodem1101
monitor_port = /dev/cu.usbmodem1101
build_flags =
    -std=gnu++17

build_src_filter = +<../test/test_imu.cpp> -<*>



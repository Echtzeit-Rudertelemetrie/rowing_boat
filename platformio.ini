; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = espNow_sensor_esp

; ------------------------------------------------------------------------------
; SHARED SETTINGS (Applies to all environments below)
; ------------------------------------------------------------------------------
[env]
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit MPU6050 @ ^2.2.6
    adafruit/Adafruit MMC56x3
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    ;madhephaestus/ESP32Servo @ ^3.0.6
    arduino-libraries/Madgwick
    tkjelectronics/Kalman Filter Library @ ^1.0.2
    sparkfun/SparkFun Qwiic Scale NAU7802 Arduino Library @ ^1.0.4

lib_ldf_mode = deep+

; ------------------------------------------------------------------------------
; 1. PRODUCTION ENVIRONMENTS
; ------------------------------------------------------------------------------
[env:espNow_receiver_esp]
platform = espressif32
board = nodemcu-32s
;upload_port = /dev/ttyUSB0
;monitor_port = /dev/ttyUSB0
build_src_filter = +<../src/main_espNow_receiver.cpp>

[env:espNow_sensor_esp]
platform = espressif32
board = esp32-s3-devkitm-1
board_upload.flash_size = 4MB
board_build.partitions = default.csv
board_build.arduino.memory_type = qio_opi
; ESP32-S3 nutzt natives USB-CDC -> ohne diese Flags kommt kein Serial-Output an
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
build_src_filter = +<../src/main_espNow_sender.cpp>

[env:BLE_sender_xiao]
; Die offizielle nordicnrf52-Plattform kennt das XIAO-Board nicht.
; Community-Fork von maxgerhardt liefert board "xiao_ble" inkl. Seeed/Adafruit
; BSP + TinyUSB (Serial1 + USB-CDC).
platform = https://github.com/maxgerhardt/platform-nordicnrf52
; angeschlossene Hardware meldet sich als "XIAO nRF52840 Sense" -> Sense-Board.
; (Pinbelegung D4/D5/D6/D7 identisch zur non-Sense-Variante "xiaoble_adafruit".)
board = xiaoblesense_adafruit
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
build_src_filter = +<../src/main_BLE_sender.cpp>
; eigene lib_deps: ESP32-only Bibliotheken aus [env] hier NICHT verwenden
;lib_deps = ?



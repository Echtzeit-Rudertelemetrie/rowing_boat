; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Default-Umgebung fuer "Build" (Strg+Alt+B)
;default_envs = prod_espNow_sender
;default_envs = prod_espNow_receiver
;default_envs = prod_nodemcu-32s
default_envs = prod_BLE_sender


; ------------------------------------------------------------------------------
; SHARED SETTINGS (Applies to all environments below)
; ------------------------------------------------------------------------------
[env]
framework = arduino
monitor_speed = 115200
build_flags = -std=gnu++17
monitor_filters = esp32_exception_decoder
lib_deps =
    adafruit/Adafruit MPU6050 @ ^2.2.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    ;madhephaestus/ESP32Servo @ ^3.0.6
    arduino-libraries/Madgwick
    tkjelectronics/Kalman Filter Library @ ^1.0.2
    sparkfun/SparkFun Qwiic Scale NAU7802 Arduino Library @ ^1.0.4
    tomstewart89/BasicLinearAlgebra
    adafruit/Adafruit MMC56x3
    ADS1115_WE
    mikalhart/TinyGPSPlus@^1.0.3

; ------------------------------------------------------------------------------
; 1. PRODUCTION ENVIRONMENTS
; ------------------------------------------------------------------------------

; ESP32-S3 mini: per-oarlock angle sensing (Gyro-EKF or Hall-switchable) + Distance Measurement Sensor (DMS)
[env:prod_espNow_sender]
platform = espressif32
board = esp32-s3-devkitc-1
board_upload.flash_size = 4MB
board_build.partitions = default.csv
board_build.arduino.memory_type = qio_opi
build_src_filter = +<main_espNow_sender.cpp>

; Aggregator: receives data from 2-8 oarlock units via ESP NOW, packages into 
;[format]
[env:prod_espNow_receiver]
platform = espressif32
board = nodemcu-32s
build_src_filter = +<main_espNow_receiver.cpp>

; Telemetry hub: UART input from prod_aggregator, onboard GPS + 6-axis IMU (accel),
; broadcasts sequenced packets to up to 4 phones via bluetooth low energy
[env:prod_BLE_sender]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-afruitnrf52-nrf52840
upload_port = /dev/cu.usbserial-110
monitor_port = /dev/cu.usbserial-110
build_src_filter = +<main_BLE_sender.cpp>
; The platform-seeedboards nrf_arduino.py adds .../Adafruit_TinyUSB_Arduino/src/arduino
; to CPPPATH but not .../src itself, so Wire_nRF52.cpp's unconditional
; #include <Adafruit_TinyUSB.h> fails to resolve without this.
build_flags =
    ${env.build_flags}
    -I${platformio.packages_dir}/framework-arduinoadafruitnrf52/libraries/Adafruit_TinyUSB_Arduino/src

[env:prod_nodemcu-32s]
platform = espressif32
board = nodemcu-32s
; Compile everything in src/, ignore the test folder
build_src_filter = +<*> -<../test/>

[env:prod_esp32dev]
platform = espressif32
board = esp32dev
upload_speed = 115200
build_src_filter = +<*> -<../test/>

; ------------------------------------------------------------------------------
; 2. ISOLATED TEAM TESTING ENVIRONMENTS
; ------------------------------------------------------------------------------
; To run these, click the PlatformIO Ant head icon on the left bar,
; open the environment (e.g. test_gyro), and click "Upload and Monitor"

[env:test_gyro]
platform = espressif32
board = nodemcu-32s
; Ignore src/main.cpp, treat test_gyro.cpp as the main program
build_src_filter = +<../test/test_gyro.cpp> -<*>

[env:test_dms]
platform = espressif32
board = nodemcu-32s
; Ignore src/main.cpp, treat test_dms.cpp as the main program
build_src_filter = +<../test/test_dms.cpp> -<*>

[env:test_hall]
platform = espressif32
board = nodemcu-32s
build_src_filter = +<../test/test_hall.cpp> -<*>

[env:test_mini]
platform = espressif32
board = esp32-s3-devkitc-1
board_upload.flash_size = 4MB
board_build.partitions = default.csv
board_build.arduino.memory_type = qio_opi
build_src_filter = +<../test/test_mini.cpp> -<*>

[env:test_receiver]
platform = espressif32
board = nodemcu-32s
build_src_filter = +<../test/test_receiver.cpp> -<*>

[env:test_sender]
platform = espressif32
board = nodemcu-32s
build_src_filter = +<../test/test_sender.cpp> -<*>

[env:test_idle]
platform = espressif32
board = nodemcu-32s
build_src_filter = +<../test/test_idle.cpp> -<*>

[env:test_ble]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
build_flags =
    -D CONFIG_BT_NIMBLE_MAX_CONNECTIONS=4
build_src_filter = +<../test/test_ble.cpp> -<*>
lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.3

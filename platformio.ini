; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Default-Umgebung fuer "Build" (Strg+Alt+B)
default_envs = prod_nodemcu-32s 
;default_envs = test_gyro

; ------------------------------------------------------------------------------
; SHARED SETTINGS (Applies to all environments below)
; ------------------------------------------------------------------------------
[env]
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit MPU6050 @ ^2.2.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    madhephaestus/ESP32Servo @ ^3.0.6
    arduino-libraries/Madgwick
    tkjelectronics/Kalman Filter Library @ ^1.0.2
    sparkfun/SparkFun Qwiic Scale NAU7802 Arduino Library @ ^1.0.4

; ------------------------------------------------------------------------------
; 1. PRODUCTION ENVIRONMENTS (Compiles src/main.cpp)
; ------------------------------------------------------------------------------
[env:prod_nodemcu-32s]
platform = espressif32
board = nodemcu-32s

upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0

; Compile everything in src/, ignore the test folder
build_src_filter = +<*> -<../test/>

[env:prod_esp32dev]
platform = espressif32
board = esp32dev
upload_speed = 115200
build_src_filter = +<*> -<../test/>

[env:test_receiver]
platform = espressif32
board = nodemcu-32s
build_src_filter = +<../test/test_receiver.cpp> -<*>

[env:test_sender]
platform = espressif32
board = nodemcu-32s
build_src_filter = +<../test/test_sender.cpp> -<*>

[env:test_idle]
platform = espressif32
board = nodemcu-32s
build_src_filter = +<../test/test_idle.cpp> -<*>

[env:test_ble]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
build_flags =
    -D CONFIG_BT_NIMBLE_MAX_CONNECTIONS=4
build_src_filter = +<../test/test_ble.cpp> -<*>
lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.3

; ------------------------------------------------------------------------------
; UART-Bruecken-Test ESP32 <-> XIAO nRF52840 (Hello World, bidirektional)
; ------------------------------------------------------------------------------
; ESP32-Seite: UART2 (RX=GPIO16, TX=GPIO17)
[env:test_uart_esp]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
build_src_filter = +<../test/test_uart_esp.cpp> -<*>
lib_deps =

; XIAO-Seite: Serial1 (D6=TX, D7=RX) + GPS-/I2C-Check auf SCL/SDA (D4/D5)
[env:test_uart_xiao]
; Die offizielle nordicnrf52-Plattform kennt das XIAO-Board nicht.
; Community-Fork von maxgerhardt liefert board "xiao_ble" inkl. Seeed/Adafruit
; BSP + TinyUSB (Serial1 + USB-CDC).
platform = https://github.com/maxgerhardt/platform-nordicnrf52
; angeschlossene Hardware meldet sich als "XIAO nRF52840 Sense" -> Sense-Board.
; (Pinbelegung D4/D5/D6/D7 identisch zur non-Sense-Variante "xiaoble_adafruit".)
board = xiaoblesense_adafruit
framework = arduino
monitor_speed = 115200
build_src_filter = +<../test/test_uart_xiao.cpp> -<*>
; eigene lib_deps: ESP32-only Bibliotheken aus [env] hier NICHT verwenden
lib_deps =


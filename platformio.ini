; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Default-Umgebung fuer "Build" (Strg+Alt+B)
;default_envs = prod_espNow_sender
;default_envs = prod_espNow_receiver
;default_envs = prod_nodemcu-32s
;default_envs = prod_BLE_sender

default_envs = test_gyro

; ------------------------------------------------------------------------------
; SHARED SETTINGS
; Applies to all [env:NAME] unless overridden in that env.
; IMPORTANT: monitor_filters is NOT set here — esp32_exception_decoder is
; ESP32-only and must not bleed into nRF52 envs.
; IMPORTANT: TinyUSB -I path is nRF52-only and must not be in [env].
; ------------------------------------------------------------------------------
[env]
framework   = arduino
monitor_speed = 115200
build_flags = -std=gnu++17
;lib_ldf_mode = deep+
lib_deps =
    adafruit/Adafruit MPU6050 @ ^2.2.6
    adafruit/Adafruit MMC56x3
    adafruit/Adafruit LSM6DS @ ^4.0
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    ;madhephaestus/ESP32Servo @ ^3.0.6
    arduino-libraries/Madgwick
    tkjelectronics/Kalman Filter Library @ ^1.0.2
    sparkfun/SparkFun Qwiic Scale NAU7802 Arduino Library @ ^1.0.4
    tomstewart89/BasicLinearAlgebra
    ADS1115_WE
    mikalhart/TinyGPSPlus@^1.0.3
 
; ------------------------------------------------------------------------------
; PRODUCTION – ESP32
; ------------------------------------------------------------------------------
 
; ESP32-S3 per-oarlock angle sensing + DMS
[env:prod_espNow_sender]
platform = espressif32
board = esp32-s3-devkitm-1
board_upload.flash_size = 4MB
board_build.partitions = default.csv
board_build.arduino.memory_type = qio_opi
; ESP32-S3 native USB-CDC: required for Serial output

build_flags =
    ${env.build_flags}
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
monitor_filters = esp32_exception_decoder
build_src_filter = -<*> +<main_espNow_sender.cpp>
 
; Aggregator: receives from 2-8 oarlock units via ESP-NOW
[env:prod_espNow_receiver]
platform = espressif32
board = nodemcu-32s
monitor_filters = esp32_exception_decoder
build_src_filter = -<*> +<main_espNow_receiver.cpp>
 
[env:prod_nodemcu-32s]
platform = espressif32
board = nodemcu-32s
monitor_filters = esp32_exception_decoder
build_src_filter = +<*> -<../test/>
 
[env:prod_esp32dev]
platform = espressif32
board = esp32dev
upload_speed = 115200
monitor_filters = esp32_exception_decoder
build_src_filter = +<*> -<../test/>
 
; ------------------------------------------------------------------------------
; PRODUCTION – nRF52
; Telemetry hub (XIAO nRF52840 Sense): UART in from aggregator, onboard GPS +
; 6-axis IMU, broadcasts via BLE to up to 4 phones.
;
; MERGE NOTE (-> main): replaces team's [env:BLE_sender_xiao]
; (maxgerhardt/platform-nordicnrf52). Delete BLE_sender_xiao, keep this.
; ------------------------------------------------------------------------------
[env:prod_BLE_sender]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-afruitnrf52-nrf52840
upload_port = /dev/cu.usbmodem1101
monitor_port = /dev/cu.usbmodem1101
build_src_filter = -<*> +<main_BLE_sender.cpp>
; platform-seeedboards nrf_arduino.py exposes .../Adafruit_TinyUSB_Arduino/src/arduino
; but not .../src itself — Wire_nRF52.cpp needs the latter unconditionally.
build_flags =
    ${env.build_flags}
    -I${platformio.packages_dir}/framework-arduinoadafruitnrf52/libraries/Adafruit_TinyUSB_Arduino/src
; Override lib_deps: exclude ESP32-oriented libs from the nRF52 build
lib_deps =
    mikalhart/TinyGPSPlus@^1.0.3
    adafruit/Adafruit LSM6DS @ ^4.0
    adafruit/Adafruit Unified Sensor @ ^1.1.14
 

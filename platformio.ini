; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Default-Umgebung fuer "Build" (Strg+Alt+B)
default_envs = prod_nau7802_s3
;default_envs = prod_ad7124_s3
;default_envs = test_gyro

; ------------------------------------------------------------------------------
; SHARED SETTINGS (Applies to all environments below)
; ------------------------------------------------------------------------------
[env]
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit MPU6050 @ ^2.2.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    madhephaestus/ESP32Servo @ ^3.0.6
    arduino-libraries/Madgwick
    tkjelectronics/Kalman Filter Library @ ^1.0.2
    sparkfun/SparkFun Qwiic Scale NAU7802 Arduino Library @ ^1.0.4

; ------------------------------------------------------------------------------
; 1. PRODUCTION ENVIRONMENTS (Compiles src/main.cpp)
;    Beide laufen auf dem Waveshare ESP32-S3-Zero; der DMS-Verstaerker wird
;    per Build-Flag gewaehlt (USE_AD7124 / USE_NAU7802).
; ------------------------------------------------------------------------------

; Gemeinsame S3-Zero-Basis (keine eigene Build-Umgebung, nur zum Vererben).
; Der S3-Zero (ESP32-S3FH4R2) hat nur 4 MB Flash -> explizit setzen, sonst
; Boot-Loop. Natives USB ohne UART-Chip -> USB-CDC aktivieren, sonst keine
; Serial-Ausgabe.
[s3_base]
platform = espressif32
board = esp32-s3-devkitc-1
board_upload.flash_size = 4MB
board_build.flash_size = 4MB
board_build.partitions = default.csv
build_src_filter = +<*> -<../test/>
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; NAU7802 (I2C) -- neuer Standardaufbau.
[env:prod_nau7802_s3]
extends = s3_base
build_flags =
    ${s3_base.build_flags}
    -D USE_NAU7802

; AD7124-8 (SPI) auf dem S3-Zero. Verdrahtung: lib/DMS/AD7124/wiring.md
[env:prod_ad7124_s3]
extends = s3_base
build_flags =
    ${s3_base.build_flags}
    -D USE_AD7124

[env:test_receiver]
platform = espressif32
board = nodemcu-32s
build_src_filter = +<../test/test_receiver.cpp> -<*>

[env:test_sender]
platform = espressif32
board = nodemcu-32s
build_src_filter = +<../test/test_sender.cpp> -<*>

[env:test_idle]
platform = espressif32
board = nodemcu-32s
build_src_filter = +<../test/test_idle.cpp> -<*>

[env:test_ble]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
build_flags =
    -D CONFIG_BT_NIMBLE_MAX_CONNECTIONS=4
build_src_filter = +<../test/test_ble.cpp> -<*>
lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.3


